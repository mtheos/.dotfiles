---
- name: Check oh-my-zsh directory
  ansible.builtin.stat:
    path: "{{ dotfiles_oh_my_zsh_dir }}"
  register: dotfiles_oh_my_zsh_dir_stat

- name: Check oh-my-zsh git checkout
  ansible.builtin.stat:
    path: "{{ dotfiles_oh_my_zsh_dir }}/.git"
  register: dotfiles_oh_my_zsh_git_stat
  when: dotfiles_oh_my_zsh_dir_stat.stat.isdir | default(false)

- name: Check for non-directory entries in pre-created oh-my-zsh directory
  ansible.builtin.find:
    paths: "{{ dotfiles_oh_my_zsh_dir }}"
    recurse: true
    hidden: true
    file_type: any
  register: dotfiles_oh_my_zsh_existing_entries
  when:
    - dotfiles_oh_my_zsh_dir_stat.stat.isdir | default(false)
    - not (dotfiles_oh_my_zsh_git_stat.stat.exists | default(false))

- name: Remove empty pre-created oh-my-zsh skeleton
  ansible.builtin.file:
    path: "{{ dotfiles_oh_my_zsh_dir }}"
    state: absent
  when:
    - dotfiles_oh_my_zsh_dir_stat.stat.isdir | default(false)
    - not (dotfiles_oh_my_zsh_git_stat.stat.exists | default(false))
    - >
      (dotfiles_oh_my_zsh_existing_entries.files | default([])
      | rejectattr("isdir")
      | list
      | length) == 0

- name: Install oh-my-zsh
  ansible.builtin.git:
    repo: "{{ dotfiles_oh_my_zsh_repo }}"
    dest: "{{ dotfiles_oh_my_zsh_dir }}"
    version: master
    update: false

- name: Ensure oh-my-zsh custom directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dotfiles_oh_my_zsh_custom }}"
    - "{{ dotfiles_oh_my_zsh_custom }}/plugins"
    - "{{ dotfiles_oh_my_zsh_custom }}/themes"

- name: Install zsh plugins
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ dotfiles_oh_my_zsh_custom }}/plugins/{{ item.name }}"
    version: "{{ item.version | default('HEAD') }}"
    update: false
  loop: "{{ dotfiles_zsh_plugins }}"

- name: Install powerlevel10k
  ansible.builtin.git:
    repo: "{{ dotfiles_powerlevel10k_repo }}"
    dest: "{{ dotfiles_powerlevel10k_dir }}"
    version: master
    update: false

- name: Install custom muse theme
  ansible.builtin.copy:
    src: "{{ dotfiles_files_dir }}/zsh/themes/muse_mod.zsh-theme"
    dest: "{{ dotfiles_oh_my_zsh_custom }}/themes/muse_mod.zsh-theme"
    mode: "0644"

- name: Set login shell to zsh
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    shell: "{{ ansible_facts.user_shell | regex_replace('([^/]+)$', 'zsh') }}"
  when: dotfiles_set_default_shell | bool
