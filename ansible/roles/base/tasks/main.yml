---
- name: Ensure local state directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dotfiles_home }}/.config"
    - "{{ dotfiles_home }}/.local"
    - "{{ dotfiles_home }}/.local/bin"
    - "{{ dotfiles_home }}/.local/state"
    - "{{ dotfiles_backup_dir }}"

- name: Install Debian base packages
  become: true
  ansible.builtin.apt:
    name: "{{ dotfiles_base_packages_common + dotfiles_base_packages_debian }}"
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install Arch base packages
  become: true
  community.general.pacman:
    name: "{{ dotfiles_base_packages_common + dotfiles_base_packages_arch }}"
    state: present
    update_cache: true
  when: ansible_os_family == "Archlinux"

- name: Install Debian Linuxbrew prerequisites
  become: true
  ansible.builtin.apt:
    name: "{{ dotfiles_linuxbrew_prereq_packages_debian }}"
    state: present
  when:
    - ansible_system == "Linux"
    - ansible_os_family == "Debian"
    - dotfiles_enable_linuxbrew | bool

- name: Install Arch Linuxbrew prerequisites
  become: true
  community.general.pacman:
    name: "{{ dotfiles_linuxbrew_prereq_packages_arch }}"
    state: present
  when:
    - ansible_system == "Linux"
    - ansible_os_family == "Archlinux"
    - dotfiles_enable_linuxbrew | bool

- name: Check whether Linuxbrew is installed
  ansible.builtin.stat:
    path: "{{ dotfiles_linuxbrew_prefix }}/bin/brew"
  register: dotfiles_linuxbrew_stat
  when:
    - ansible_system == "Linux"
    - dotfiles_enable_linuxbrew | bool

- name: Install Linuxbrew
  ansible.builtin.shell: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  args:
    executable: /bin/bash
    creates: "{{ dotfiles_linuxbrew_prefix }}/bin/brew"
  environment:
    NONINTERACTIVE: "1"
  when:
    - ansible_system == "Linux"
    - dotfiles_enable_linuxbrew | bool
    - not dotfiles_linuxbrew_stat.stat.exists

- name: Install Linuxbrew packages
  community.general.homebrew:
    name: "{{ dotfiles_linuxbrew_packages }}"
    state: present
    path: "{{ dotfiles_linuxbrew_prefix }}/bin"
  environment:
    PATH: "{{ dotfiles_linuxbrew_prefix }}/bin:{{ ansible_env.PATH }}"
  when:
    - ansible_system == "Linux"
    - dotfiles_enable_linuxbrew | bool

- name: Ensure Nerd Fonts directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ dotfiles_nerd_fonts_cache_dir }}"
    - "{{ dotfiles_nerd_fonts_install_dir }}"
  when:
    - ansible_system == "Linux"
    - dotfiles_enable_nerd_fonts | bool

- name: Download Nerd Fonts archives
  ansible.builtin.get_url:
    url: >-
      https://github.com/ryanoasis/nerd-fonts/releases/download/v{{
      dotfiles_nerd_fonts_version }}/{{ item.archive }}
    dest: "{{ dotfiles_nerd_fonts_cache_dir }}/{{ item.archive }}"
    mode: "0644"
  loop: "{{ dotfiles_nerd_fonts }}"
  when:
    - ansible_system == "Linux"
    - dotfiles_enable_nerd_fonts | bool

- name: Ensure per-font install directories exist
  ansible.builtin.file:
    path: "{{ dotfiles_nerd_fonts_install_dir }}/{{ item.name }}"
    state: directory
    mode: "0755"
  loop: "{{ dotfiles_nerd_fonts }}"
  when:
    - ansible_system == "Linux"
    - dotfiles_enable_nerd_fonts | bool

- name: Extract Nerd Fonts archives
  ansible.builtin.unarchive:
    src: "{{ dotfiles_nerd_fonts_cache_dir }}/{{ item.archive }}"
    dest: "{{ dotfiles_nerd_fonts_install_dir }}/{{ item.name }}"
    remote_src: true
    creates: "{{ dotfiles_nerd_fonts_install_dir }}/{{ item.name }}/.version-{{ dotfiles_nerd_fonts_version }}"
  loop: "{{ dotfiles_nerd_fonts }}"
  when:
    - ansible_system == "Linux"
    - dotfiles_enable_nerd_fonts | bool

- name: Mark installed Nerd Fonts version
  ansible.builtin.copy:
    dest: "{{ dotfiles_nerd_fonts_install_dir }}/{{ item.name }}/.version-{{ dotfiles_nerd_fonts_version }}"
    content: "{{ dotfiles_nerd_fonts_version }}\n"
    mode: "0644"
  loop: "{{ dotfiles_nerd_fonts }}"
  when:
    - ansible_system == "Linux"
    - dotfiles_enable_nerd_fonts | bool

- name: Refresh font cache
  ansible.builtin.command: fc-cache -f "{{ dotfiles_nerd_fonts_install_dir }}"
  changed_when: false
  failed_when: false
  when:
    - ansible_system == "Linux"
    - dotfiles_enable_nerd_fonts | bool

- name: Install macOS base packages
  community.general.homebrew:
    name: "{{ dotfiles_base_packages_macos }}"
    state: present
  when: ansible_system == "Darwin"

- name: Install macOS casks
  community.general.homebrew_cask:
    name: "{{ dotfiles_base_casks_macos }}"
    state: present
  when: ansible_system == "Darwin"
