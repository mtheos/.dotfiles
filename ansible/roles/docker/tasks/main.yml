---
- name: Install Docker packages on supported systems
  when:
    - dotfiles_enable_docker | bool
    - ansible_os_family == "Debian"
    - ansible_distribution in ["Debian", "Ubuntu"]
  block:
    - name: Install Docker apt prerequisites
      become: true
      ansible.builtin.apt:
        name: "{{ dotfiles_docker_prerequisites }}"
        state: present
        update_cache: true

    - name: Ensure Docker keyring directory exists
      become: true
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install Docker signing key
      become: true
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Configure Docker apt repository
      become: true
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ dotfiles_docker_arch_map.get(ansible_architecture, ansible_architecture) }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/{{ ansible_distribution | lower }}
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker

    - name: Install Docker packages
      become: true
      ansible.builtin.apt:
        name: "{{ dotfiles_docker_packages }}"
        state: present
        update_cache: true
